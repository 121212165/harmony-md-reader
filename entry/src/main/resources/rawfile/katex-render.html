<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KaTeX Math Renderer</title>
  <style>
    /* ── 基础重置 ── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #FFFFFF;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Cambria Math', 'Latin Modern Math', 'STIX Two Math', serif;
    }

    /* ── 渲染容器 ── */
    #math-container {
      text-align: center;
      font-size: 16px;
      line-height: 1.6;
      color: #1A1A1A;
      padding: 16px;
      max-width: 100%;
      overflow-x: auto;
    }

    /* ── 简化版数学公式样式 ── */
    .math-block {
      display: block;
      text-align: center;
      padding: 8px 0;
    }

    .math-inline {
      display: inline;
    }

    /* 分数 */
    .frac {
      display: inline-block;
      vertical-align: middle;
      text-align: center;
    }
    .frac-num {
      display: block;
      border-bottom: 1px solid #1A1A1A;
      padding: 0 4px 2px;
      font-size: 0.85em;
    }
    .frac-den {
      display: block;
      padding: 2px 4px 0;
      font-size: 0.85em;
    }

    /* 上标 / 下标 */
    .sup {
      font-size: 0.75em;
      vertical-align: super;
    }
    .sub {
      font-size: 0.75em;
      vertical-align: sub;
    }

    /* 根号 */
    .sqrt {
      display: inline-block;
      border-top: 1px solid #1A1A1A;
      padding: 2px 4px 0;
      margin-left: 8px;
      position: relative;
    }
    .sqrt::before {
      content: '\221A';
      position: absolute;
      left: -12px;
      top: -2px;
      font-size: 1.1em;
    }

    /* 大运算符 */
    .big-op {
      font-size: 1.4em;
      vertical-align: middle;
      margin: 0 2px;
    }

    /* 括号 */
    .paren {
      font-size: 1.2em;
      vertical-align: middle;
    }

    /* ── 错误状态 ── */
    .math-error {
      color: #6B7280;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      background: #F8F9FA;
      border: 1px solid #E4E7EC;
      border-radius: 4px;
      padding: 8px 12px;
      white-space: pre-wrap;
      word-break: break-all;
      text-align: left;
    }

    /* ── 加载状态 ── */
    .math-loading {
      color: #9CA3AF;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="math-container">
    <span class="math-loading">等待渲染...</span>
  </div>

  <script>
    /**
     * 简化的 LaTeX 数学公式渲染器
     * 将常见 LaTeX 语法转换为 HTML 展示
     *
     * 支持的语法：
     * - \frac{a}{b}    → 分数
     * - x^{2}          → 上标
     * - x_{i}          → 下标
     * - \sqrt{x}       → 根号
     * - \sum, \int, \prod → 大运算符
     * - \alpha, \beta, \gamma, ... → 希腊字母
     * - \infty, \partial, \nabla → 特殊符号
     * - \left( \right) → 自适应括号
     * - 基本运算符 +, -, =, <, >, \leq, \geq, \neq, \approx
     */

    // 希腊字母映射表
    var greekLetters = {
      '\\alpha': '\u03B1', '\\beta': '\u03B2', '\\gamma': '\u03B3',
      '\\delta': '\u03B4', '\\epsilon': '\u03B5', '\\zeta': '\u03B6',
      '\\eta': '\u03B7', '\\theta': '\u03B8', '\\iota': '\u03B9',
      '\\kappa': '\u03BA', '\\lambda': '\u03BB', '\\mu': '\u03BC',
      '\\nu': '\u03BD', '\\xi': '\u03BE', '\\pi': '\u03C0',
      '\\rho': '\u03C1', '\\sigma': '\u03C3', '\\tau': '\u03C4',
      '\\upsilon': '\u03C5', '\\phi': '\u03C6', '\\chi': '\u03C7',
      '\\psi': '\u03C8', '\\omega': '\u03C9',
      '\\Alpha': '\u0391', '\\Beta': '\u0392', '\\Gamma': '\u0393',
      '\\Delta': '\u0394', '\\Theta': '\u0398', '\\Lambda': '\u039B',
      '\\Pi': '\u03A0', '\\Sigma': '\u03A3', '\\Phi': '\u03A6',
      '\\Psi': '\u03A8', '\\Omega': '\u03A9',
      '\\varepsilon': '\u03B5', '\\varphi': '\u03D5'
    };

    // 特殊符号映射表
    var specialSymbols = {
      '\\infty': '\u221E', '\\partial': '\u2202', '\\nabla': '\u2207',
      '\\forall': '\u2200', '\\exists': '\u2203', '\\emptyset': '\u2205',
      '\\in': '\u2208', '\\notin': '\u2209', '\\subset': '\u2282',
      '\\supset': '\u2283', '\\cup': '\u222A', '\\cap': '\u2229',
      '\\leq': '\u2264', '\\geq': '\u2265', '\\neq': '\u2260',
      '\\approx': '\u2248', '\\equiv': '\u2261', '\\sim': '\u223C',
      '\\times': '\u00D7', '\\div': '\u00F7', '\\pm': '\u00B1',
      '\\cdot': '\u00B7', '\\cdots': '\u22EF', '\\ldots': '\u2026',
      '\\to': '\u2192', '\\rightarrow': '\u2192', '\\leftarrow': '\u2190',
      '\\Rightarrow': '\u21D2', '\\Leftarrow': '\u21D0',
      '\\leftrightarrow': '\u2194',
      '\\sum': '\u2211', '\\prod': '\u220F', '\\int': '\u222B',
      '\\oint': '\u222E', '\\iint': '\u222C',
      '\\lim': 'lim', '\\log': 'log', '\\ln': 'ln',
      '\\sin': 'sin', '\\cos': 'cos', '\\tan': 'tan',
      '\\exp': 'exp', '\\max': 'max', '\\min': 'min',
      '\\quad': '\u2003', '\\qquad': '\u2003\u2003',
      '\\,': '\u2009', '\\;': '\u2005', '\\!': '',
      '\\left': '', '\\right': '',
      '\\langle': '\u27E8', '\\rangle': '\u27E9',
      '\\lfloor': '\u230A', '\\rfloor': '\u230B',
      '\\lceil': '\u2308', '\\rceil': '\u2309'
    };

    // 合并所有命令映射
    var allCommands = {};
    for (var k in greekLetters) allCommands[k] = greekLetters[k];
    for (var k in specialSymbols) allCommands[k] = specialSymbols[k];

    /**
     * 提取花括号内的内容
     * @param {string} text - 输入文本
     * @param {number} start - 起始位置（{ 的位置）
     * @returns {{ content: string, end: number }}
     */
    function extractBraced(text, start) {
      if (text[start] !== '{') return { content: '', end: start };
      var depth = 0;
      var i = start;
      for (; i < text.length; i++) {
        if (text[i] === '{') depth++;
        else if (text[i] === '}') {
          depth--;
          if (depth === 0) {
            return { content: text.substring(start + 1, i), end: i };
          }
        }
      }
      return { content: text.substring(start + 1), end: text.length - 1 };
    }

    /**
     * 解析并渲染 LaTeX 字符串为 HTML
     * @param {string} latex - LaTeX 公式字符串
     * @returns {string} HTML 字符串
     */
    function renderMath(latex) {
      try {
        var html = parseExpr(latex, 0, latex.length);
        return '<div class="math-block">' + html + '</div>';
      } catch (e) {
        return '<div class="math-error">' + escapeHtml(latex) + '</div>';
      }
    }

    /**
     * 递归解析 LaTeX 表达式
     */
    function parseExpr(text, start, end) {
      var result = '';
      var i = start;

      while (i < end) {
        var ch = text[i];

        // 花括号分组
        if (ch === '{') {
          var brace = extractBraced(text, i);
          result += parseExpr(brace.content, 0, brace.content.length);
          i = brace.end + 1;
          continue;
        }

        // 上标
        if (ch === '^') {
          i++;
          if (i < end && text[i] === '{') {
            var brace = extractBraced(text, i);
            result += '<span class="sup">' + parseExpr(brace.content, 0, brace.content.length) + '</span>';
            i = brace.end + 1;
          } else if (i < end) {
            result += '<span class="sup">' + escapeHtml(text[i]) + '</span>';
            i++;
          }
          continue;
        }

        // 下标
        if (ch === '_') {
          i++;
          if (i < end && text[i] === '{') {
            var brace = extractBraced(text, i);
            result += '<span class="sub">' + parseExpr(brace.content, 0, brace.content.length) + '</span>';
            i = brace.end + 1;
          } else if (i < end) {
            result += '<span class="sub">' + escapeHtml(text[i]) + '</span>';
            i++;
          }
          continue;
        }

        // 反斜杠命令
        if (ch === '\\') {
          var cmdEnd = i + 1;
          // 读取命令名（字母组成）
          while (cmdEnd < end && /[a-zA-Z]/.test(text[cmdEnd])) cmdEnd++;

          if (cmdEnd === i + 1) {
            // 非字母转义（如 \\, \{, \}）
            if (cmdEnd < end) {
              var esc = text[cmdEnd];
              if (esc === '\\') result += '<br>';
              else if (esc === '{') result += '{';
              else if (esc === '}') result += '}';
              else result += escapeHtml(esc);
              i = cmdEnd + 1;
            } else {
              i = cmdEnd;
            }
            continue;
          }

          var cmd = text.substring(i, cmdEnd);

          // \frac{num}{den}
          if (cmd === '\\frac') {
            var numBrace = extractBraced(text, cmdEnd);
            var denBrace = extractBraced(text, numBrace.end + 1);
            result += '<span class="frac"><span class="frac-num">' +
              parseExpr(numBrace.content, 0, numBrace.content.length) +
              '</span><span class="frac-den">' +
              parseExpr(denBrace.content, 0, denBrace.content.length) +
              '</span></span>';
            i = denBrace.end + 1;
            continue;
          }

          // \sqrt{x}
          if (cmd === '\\sqrt') {
            var sqrtBrace = extractBraced(text, cmdEnd);
            result += '<span class="sqrt">' +
              parseExpr(sqrtBrace.content, 0, sqrtBrace.content.length) +
              '</span>';
            i = sqrtBrace.end + 1;
            continue;
          }

          // \text{...}
          if (cmd === '\\text' || cmd === '\\mathrm' || cmd === '\\textrm') {
            var textBrace = extractBraced(text, cmdEnd);
            result += '<span style="font-family: sans-serif; font-style: normal;">' +
              escapeHtml(textBrace.content) + '</span>';
            i = textBrace.end + 1;
            continue;
          }

          // \mathbf{...}
          if (cmd === '\\mathbf' || cmd === '\\boldsymbol' || cmd === '\\bf') {
            var bfBrace = extractBraced(text, cmdEnd);
            result += '<b>' + parseExpr(bfBrace.content, 0, bfBrace.content.length) + '</b>';
            i = bfBrace.end + 1;
            continue;
          }

          // \mathit{...}
          if (cmd === '\\mathit') {
            var itBrace = extractBraced(text, cmdEnd);
            result += '<i>' + parseExpr(itBrace.content, 0, itBrace.content.length) + '</i>';
            i = itBrace.end + 1;
            continue;
          }

          // 大运算符（带 limits）
          if (cmd === '\\sum' || cmd === '\\prod' || cmd === '\\int' || cmd === '\\oint') {
            var symbol = allCommands[cmd] || cmd;
            result += '<span class="big-op">' + symbol + '</span>';
            i = cmdEnd;
            continue;
          }

          // 已知命令替换
          if (allCommands[cmd] !== undefined) {
            result += allCommands[cmd];
            i = cmdEnd;
            continue;
          }

          // 未知命令 — 原样输出
          result += escapeHtml(cmd);
          i = cmdEnd;
          continue;
        }

        // 普通字符
        if (ch === ' ') {
          result += '&thinsp;';
        } else if (ch === '<') {
          result += '&lt;';
        } else if (ch === '>') {
          result += '&gt;';
        } else if (ch === '&') {
          result += '&amp;';
        } else {
          result += ch;
        }
        i++;
      }

      return result;
    }

    /**
     * HTML 转义
     */
    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── 对外接口 ──

    /**
     * 外部调用入口
     * 通过 window._renderContent(latexString) 调用
     * @param {string} latexString - LaTeX 公式字符串
     */
    window._renderContent = function(latexString) {
      var container = document.getElementById('math-container');
      if (!latexString || latexString.trim().length === 0) {
        container.innerHTML = '<span class="math-loading">空公式</span>';
        return;
      }
      container.innerHTML = renderMath(latexString);
    };

    /**
     * 渲染数学公式（内部函数也暴露到全局）
     */
    window.renderMath = renderMath;
  </script>
</body>
</html>
