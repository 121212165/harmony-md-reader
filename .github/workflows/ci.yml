name: HarmonyMDReader CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  check:
    name: '🔍 代码检查'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 验证项目结构
        run: |
          echo "=== 验证 HarmonyOS 项目结构 ==="
          for f in "build-profile.json5" "oh-package.json5"; do
            if [ -f "$f" ]; then echo "  ✅ $f"; else echo "  ❌ $f 缺失"; fi
          done
          if [ -f "entry/src/main/module.json5" ]; then echo "  ✅ entry module"; else echo "  ❌ entry module 缺失"; fi
          echo ""
          echo "=== 模块目录 ==="
          find . -name "module.json5" -type f | sort

      - name: 代码文件统计
        run: |
          echo "=== .ets 文件统计 ==="
          find . -name "*.ets" -type f | sort
          echo ""
          ets_count=$(find . -name "*.ets" | wc -l)
          line_count=$(find . -name "*.ets" -exec cat {} + 2>/dev/null | wc -l)
          echo "总计 .ets 文件: $ets_count"
          echo "总代码行数: $line_count"

      - name: 代码基础检查
        run: |
          echo "=== .ets 文件基础检查 ==="
          find . -name "*.ets" -type f | while read f; do
            lines=$(wc -l < "$f")
            echo "  $f: $lines lines"
          done
          echo "✅ 文件检查完成"

      - name: 生成检查报告
        run: |
          echo "# HarmonyMDReader 检查报告" > check-report.md
          echo "" >> check-report.md
          echo "## 项目统计" >> check-report.md
          echo "- .ets 文件数: $(find . -name '*.ets' | wc -l)" >> check-report.md
          echo "- 总代码行数: $(find . -name '*.ets' -exec cat {} + 2>/dev/null | wc -l)" >> check-report.md
          echo "" >> check-report.md
          echo "## 模块结构" >> check-report.md
          echo '```' >> check-report.md
          find . -name "*.ets" -type f | sort >> check-report.md
          echo '```' >> check-report.md
          cat check-report.md

      - name: 上传检查报告
        uses: actions/upload-artifact@v4
        with:
          name: check-report
          path: check-report.md
          retention-days: 7

  release:
    name: '🚀 发布'
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 生成版本号
        id: version
        run: |
          DATE=$(date +'%Y%m%d')
          COUNT=$(git rev-list --count HEAD)
          echo "version=v1.0.${COUNT}-${DATE}" >> $GITHUB_OUTPUT
          echo "tag=v1.0.${COUNT}" >> $GITHUB_OUTPUT

      - name: 生成变更日志
        run: |
          echo "# HarmonyMDReader ${{ steps.version.outputs.version }}" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## 项目统计" >> CHANGELOG.md
          echo "- .ets 文件: $(find . -name '*.ets' | wc -l) 个" >> CHANGELOG.md
          echo "- 代码行数: $(find . -name '*.ets' -exec cat {} + 2>/dev/null | wc -l)" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## 提交历史" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          git log --oneline -20 >> CHANGELOG.md

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
